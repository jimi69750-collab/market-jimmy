<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET JIMMY</title>
    <style>
        /* Gaya Dasar Website */
        body {
            background: #0b0b0b;
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            animation: fadeIn 1.5s ease-in-out;
            /* Memastikan seluruh area layar bisa menerima ketukan musik */
            min-height: 100vh;
        }

        /* Animasi Mengambang untuk Judul */
        h1 {
            color: #00c8ff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        p {
            font-size: 1.1rem;
            color: #ccc;
        }

        h2 {
            margin-top: 40px;
            border-bottom: 2px solid #00c8ff;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Animasi Tombol WhatsApp Bergetar/Membesar */
        .btn-wa {
            display: inline-block;
            padding: 15px 30px;
            background: #00c8ff;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 30px;
            transition: 0.3s;
            animation: pulse 2s infinite;
        }

        /* --- LOGIK ANIMASI (Keyframes) --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 200, 255, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(0, 200, 255, 0); transform: scale(1.03); }
            100% { box-shadow: 0 0 0 0 rgba(0, 200, 255, 0); transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🚀 MARKET JIMMY 🚀</h1>
    <p>Selamat datang di website resmi Market Jimmy.</p>

    <h2>Produk</h2>
    <p>🎬 APK Movie - Rp2.000</p>
    <p>🖼️ APK HD Foto - Rp2.000</p>
    <p>⚔️ JASA LOGO - Rp2.500</p>

    <br>

    <a href="https://wa.me/6287852990112" class="btn-wa">
        Chat WhatsApp
    </a>

    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/pi0jsd.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Fungsi untuk maksa putar musik
        function jalankanMusik() {
            var audio = document.getElementById("bgMusic");
            audio.play().catch(function(error) {
                console.log("Musik ketahan browser: ", error);
            });
        }

        /* JALUR VIP INTERAKSI: Begitu layar disentuh/diklik/dilepas sidik jarinya, langsung gas musiknya */
        document.body.addEventListener('click', jalankanMusik, { once: true });
        document.body.addEventListener('touchend', jalankanMusik, { once: true });
        document.body.addEventListener('pointerdown', jalankanMusik, { once: true });
    </script>

</body>
</html>
