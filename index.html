
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOSHI - JIMMY</title>
    <style>
        :root {
            --bg-color: #0b0f12;
            --accent-cyan: #00e5ff;
            --white: #ffffff;
            --card-bg: #1a2026;
        }
        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-color);
            color: var(--white);
            height: 100%;
            overflow-x: hidden;
        }
        /* Lockscreen */
        #lockscreen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }
        #main-app { display: none; padding: 20px; }
        
        .clock { font-size: 2rem; font-weight: bold; margin-bottom: 20px; color: var(--accent-cyan); }
        .btn-enter {
            background: transparent; border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan); padding: 15px 40px;
            font-size: 1.2rem; cursor: pointer; border-radius: 8px;
            text-transform: uppercase;
        }
        
        /* Dashboard Layout */
        .card {
            background: var(--card-bg); border: 1px solid #333;
            padding: 20px; border-radius: 15px; margin-bottom: 20px;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .feature-box {
            background: var(--card-bg); border: 1px solid var(--accent-cyan);
            padding: 15px; border-radius: 10px; text-align: center; cursor: pointer;
        }
        .header-text { text-align: center; color: var(--accent-cyan); font-size: 2rem; }
        
        /* Hidden video/audio elements */
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; opacity: 0.2; }
    </style>
</head>
<body>

    <!-- Background Multimedia -->
    <video autoplay muted loop id="bg-video">
        <source src="https://v1.pinimg.com/videos/iht/720p/1c/55/b0/1c55b0875dcb3d9a0ee051c8defa83da.mp4" type="video/mp4">
    </video>
    <audio id="bg-audio" loop>
        <source src="https://files.catbox.moe/j3mj8v.mp3" type="audio/mpeg">
    </audio>

    <!-- Lockscreen -->
    <div id="lockscreen">
        <h1>MOSHI</h1>
        <div class="clock" id="clock1"></div>
        <button class="btn-enter" onclick="enterApp()">MASUK</button>
    </div>

    <!-- Main App -->
    <div id="main-app">
        <h1 class="header-text">JIMMY DASHBOARD</h1>
        <div class="clock" id="clock2"></div>
        
        <div class="grid">
            <div class="feature-box" onclick="window.open('https://www.slazzer.com', '_blank')">Remove BG</div>
            <div class="feature-box">TikTok Downloader (MP3/NoBG)</div>
            <div class="feature-box" onclick="toggleApkMenu()">APK PREMIUM</div>
            <div class="feature-box" onclick="window.open('https://quran.com', '_blank')">Al-Qur'an Online</div>
        </div>
        
        <div id="apk-menu" style="display:none; margin-top:20px;">
            <div class="grid">
                <div class="feature-box" onclick="window.location.href='https://www.mediafire.com/file/5w7lnu12qmaa6g4/Moviebox_2026_mod.apk/file'">APK MOVIE</div>
                <div class="feature-box" onclick="window.location.href='https://www.mediafire.com/file/3ruvkktu3syfgam?dkey=l84vb04jhkp&r=1936'">APK HD FOTO</div>
            </div>
        </div>
        
        <div class="card" onclick="window.location.href='https://wa.me/6287852990112'">
            <h3>HUBUNGI OWNER (JIMMY)</h3>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString();
            document.getElementById('clock1').innerText = time;
            document.getElementById('clock2').innerText = time;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function enterApp() {
            document.getElementById('lockscreen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('bg-audio').play();
        }
        
        function toggleApkMenu() {
            const menu = document.getElementById('apk-menu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
