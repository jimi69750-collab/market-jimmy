<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET JIMMY</title>
    <style>
        /* Memastikan area layar 100% penuh terisi agar sensor ketukan merata */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #0b0b0b;
        }
        body {
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 50px 20px;
            box-sizing: border-box;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Animasi Mengambang untuk Judul */
        h1 {
            color: #00c8ff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        p {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 5px;
        }

        /* Gaya Teks Judul Lagu */
        .song-info {
            font-size: 0.85rem;
            color: #00c8ff;
            background: rgba(0, 200, 255, 0.1);
            display: inline-block;
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid rgba(0, 200, 255, 0.3);
            margin-top: 10px;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(0, 200, 255, 0.1);
        }

        h2 {
            border-bottom: 2px solid #00c8ff;
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        /* --- DESAIN KOTAK PRODUK BARU --- */
        .product-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 340px;
            margin: 0 auto;
        }

        .product-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            font-size: 1.05rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: 0.3s ease;
        }

        /* Efek menyala pas kotak disentuh/di-hover */
        .product-box:hover, .product-box:active {
            border-color: #00c8ff;
            background: rgba(0, 200, 255, 0.05);
            transform: scale(1.02);
        }

        .product-price {
            color: #00c8ff;
            font-weight: bold;
        }

        /* Animasi Tombol WhatsApp Bergetar */
        .btn-wa {
            display: inline-block;
            padding: 15px 30px;
            background: #00c8ff;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 35px;
            transition: 0.3s;
            animation: pulse 2s infinite;
        }

        /* --- LOGIK ANIMASI (Keyframes) --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 200, 255, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(0, 200, 255, 0); transform: scale(1.03); }
            100% { box-shadow: 0 0 0 0 rgba(0, 200, 255, 0); transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🚀 MARKET JIMMY 🚀</h1>
    <p>Selamat datang di website resmi Market Jimmy.</p>
    
    <!-- Teks Judul Lagu -->
    <div class="song-info">
        🎵 VACATION BIBLE + BROOKLYN BLOOD POP
    </div>

    <h2>Produk</h2>

    <!-- Daftar Produk Menggunakan Kotak Rapi -->
    <div class="product-container">
        <div class="product-box">
            <span>🎬 APK Movie</span>
            <span class="product-price">Rp2.000</span>
        </div>
        <div class="product-box">
            <span>🖼️ APK HD Foto</span>
            <span class="product-price">Rp2.000</span>
        </div>
        <div class="product-box">
            <span>⚔️ JASA LOGO</span>
            <span class="product-price">Rp2.500</span>
        </div>
        <!-- Produk Baru -->
        <div class="product-box" style="border-color: rgba(0, 200, 255, 0.4);">
            <span>🤖 PANEL BOT LEGAL (1 Bulan)</span>
            <span class="product-price">Rp5.000</span>
        </div>
    </div>

    <br>

    <!-- Tombol WA -->
    <a href="https://wa.me/6287852990112" class="btn-wa">
        Chat WhatsApp
    </a>

    <!-- Audio Element Catbox -->
    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/pi0jsd.mp3" type="audio/mpeg">
    </audio>

    <script>
        function jalankanMusik() {
            var audio = document.getElementById("bgMusic");
            audio.play().catch(function(error) {
                console.log("Musik tertahan browser:", error);
            });
        }

        /* Pemicu otomatis pas layar disentuh/diklik pertama kali di area mana saja */
        window.addEventListener('click', jalankanMusik, { once: true });
        window.addEventListener('touchstart', jalankanMusik, { once: true });
        window.addEventListener('touchend', jalankanMusik, { once: true });
    </script>

</body>
</html>
