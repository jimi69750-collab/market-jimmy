<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOSHI - Dashboard</title>
    <style>
        :root {
            --bg-color: #0a0e14;
            --container-bg: #151a23;
            --cyan: #00d4ff;
            --white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--white);
            font-family: sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: rgba(21, 26, 35, 0.95);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .clock { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: var(--cyan); }
        .btn-masuk { background: var(--cyan); color: #000; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; border: none; margin-top: 15px; }
        .hidden { display: none; }
        
        .grid-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .box { background: rgba(28, 35, 45, 0.9); padding: 15px; border-radius: 10px; border: 1px solid var(--cyan); cursor: pointer; color: var(--white); text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        .modal { background: var(--container-bg); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid var(--cyan); position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 300px; z-index: 10; }
        .modal a { display: block; background: var(--cyan); color: #000; padding: 10px; margin: 10px 0; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- https://v1.pinimg.com/videos/iht/720p/1c/55/b0/1c55b0875dcb3d9a0ee051c8defa83da.mp4 -->

    <audio id="bg-audio" loop>
        <source src="https://files.catbox.moe/j3mj8v.mp3" type="audio/mpeg">
    </audio>

    <div id="lockscreen" class="container">
        <h1>MOSHI</h1>
        <div id="clock1" class="clock"></div>
        <button class="btn-masuk" onclick="enterApp()">MASUK</button>
    </div>

    <div id="dashboard" class="container hidden">
        <h2>Dashboard MOSHI</h2>
        <div id="clock2" class="clock"></div>
        <p>Owner: JIMMY</p>
        
        <div class="grid-box">
            <a class="box" href="https://www.slazzer.com" target="_blank">Remove BG</a>
            <a class="box" href="https://tiktokia.com" target="_blank">TikTok Downloader</a>
            <div class="box" onclick="showModal()">APK PREMIUM</div>
            <a class="box" href="https://quran.com" target="_blank">Al-Qur'an Online</a>
            <a class="box" style="grid-column: span 2;" href="https://wa.me/6287852990112" target="_blank">Hubungi Owner</a>
        </div>
        <p style="font-size: 10px; margin-top: 20px;">Fungsi APK: Aplikasi ini dibuat untuk membantu sesama orang.</p>
    </div>

    <div id="apk-modal" class="modal hidden">
        <h3>Pilih APK:</h3>
        <a href="https://www.mediafire.com/file/5w7lnu12qmaa6g4/Moviebox_2026_mod.apk/file">APK MOVIE</a>
        <a href="https://www.mediafire.com/file/3ruvkktu3syfgam?dkey=l84vb04jhkp&r=1936">APK HD FOTO</a>
        <button onclick="hideModal()" style="width: 100%; padding: 10px; border-radius: 5px; border: none; cursor: pointer; background: #eee;">Tutup</button>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            document.getElementById('clock1').innerText = timeString;
            document.getElementById('clock2').innerText = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function enterApp() {
            document.getElementById('bg-audio').play();
            document.getElementById('lockscreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function showModal() { document.getElementById('apk-modal').classList.remove('hidden'); }
        function hideModal() { document.getElementById('apk-modal').classList.add('hidden'); }
    </script>
</body>
</html>
